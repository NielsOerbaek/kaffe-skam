<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaffe-skam</title>
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500&f[]=cabinet-grotesk@300,400&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="landscape" id="root">
    <section class="pane left">
      <div class="label">Dagens kaffe-CO₂eq</div>
      <div class="hero" id="today-co2">—</div>
      <div class="sub" id="today-equiv">&nbsp;</div>
      <div class="meta">
        <div><div class="label">Kopper</div><div class="n" id="today-cups">—</div></div>
        <div><div class="label">Denne måned</div><div class="n" id="month-co2">—</div></div>
      </div>
    </section>
    <div class="divider"></div>
    <section class="pane right" id="last-brew-pane">
      <div class="label" id="last-label">Seneste bryg</div>
      <div class="drink-name" id="drink-name">—</div>
      <div class="composition" id="composition">&nbsp;</div>
      <div class="brew-co2" id="brew-co2">—</div>
      <div class="delta-line">
        <span class="delta-inline" id="delta">—</span>
        <span class="vs" id="vs">&nbsp;</span>
      </div>
    </section>
  </main>

  <div class="status" aria-hidden="false">
    <span class="chip" id="chip-status">Live</span>
    <span class="chip alt" id="chip-time">—</span>
  </div>
  <div class="stale-badge" id="stale-badge" hidden>signal mistet</div>

  <script src="/static/app.js"></script>
</body>
</html>
