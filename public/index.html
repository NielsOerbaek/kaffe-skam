<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kaffe og Carbon</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="preconnect" href="https://api.fontshare.com">
  <link rel="stylesheet" href="https://api.fontshare.com/v2/css?f[]=general-sans@200,300,400,500&f[]=cabinet-grotesk@300,400&display=swap">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="landscape" id="root">
    <section class="pane left">
      <div class="left-top">
        <div class="label">Dagens CO₂eq</div>
        <div class="hero" id="today-co2">—</div>
        <div class="sub" id="today-cups-line">&nbsp;</div>
        <div class="sub-faint equiv" id="today-equiv">&nbsp;</div>
      </div>
      <div class="left-bottom">
        <div class="label month-header" id="month-header">—</div>
        <div class="month-stats">
          <div>
            <div class="label">Antal kopper</div>
            <div class="n" id="month-cups">—</div>
          </div>
          <div>
            <div class="label">CO₂ udledt</div>
            <div class="n" id="month-co2">—</div>
          </div>
        </div>
      </div>
    </section>
    <div class="divider"></div>
    <section class="pane right" id="last-brew-pane">
      <div class="label" id="last-label">Seneste bryg</div>
      <div class="drink-line">
        <span class="drink-name" id="drink-name">—</span>
        <span class="drink-floor" id="drink-floor"></span>
      </div>
      <div class="composition" id="composition">&nbsp;</div>
      <div class="brew-co2" id="brew-co2">—</div>
      <div class="delta-line">
        <span class="delta-inline" id="delta">—</span>
        <span class="vs" id="vs">&nbsp;</span>
      </div>
      <div class="previous-brews" id="previous-brews">
        <div class="label">Tidligere</div>
        <ul class="previous-list" id="previous-list"></ul>
      </div>
    </section>
  </main>

  <div class="brand" id="brand">&nbsp;</div>
  <nav class="nav">
    <a href="/" class="active">Live</a>
    <a href="/timeline">Tidslinje</a>
    <a href="/drinks">Pr. drik</a>
    <a href="/metode">Metode</a>
  </nav>
  <div class="footnote" aria-hidden="false">
    Tallene dækker kun kaffebønner og mælk &nbsp;·&nbsp; elektricitet, vand og emballage er ikke regnet med
  </div>

  <div class="status" aria-hidden="false">
    <span class="chip" id="chip-status">Live</span>
    <span class="chip alt" id="chip-time">—</span>
  </div>
  <div class="stale-badge" id="stale-badge" hidden>signal mistet</div>

  <script src="/static/app.js"></script>
</body>
</html>
